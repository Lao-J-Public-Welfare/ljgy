<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #12c2e9, #c471ed, #f64f59);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 450px;
            max-width: 90%;
            overflow: hidden;
            position: relative;
        }
        
        .header {
            background-color: #1e88e5;
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 500;
        }
        
        .logo {
            width: 60px;
            height: 60px;
            background-color: white;
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: #1e88e5;
            font-weight: bold;
        }
        
        .form-container {
            padding: 20px 30px;
        }
        
        .input-group {
            margin-bottom: 15px;
            position: relative;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            border-color: #1e88e5;
            outline: none;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #1e88e5;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        
        .btn:hover {
            background-color: #1565c0;
        }
        
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #eee;
        }
        
        .error-message {
            color: #f44336;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .success-message {
            color: #4caf50;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .login-options {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        
        .login-options a {
            color: #1e88e5;
            text-decoration: none;
        }
        
        .login-options a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            .container {
                width: 95%;
            }
            
            .form-container {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">梨</div>
            <h1>三高校园墙</h1>
        </div>
        
        <div class="form-container">
            <!-- 注册表单 -->
            <form id="registerForm">
                <div class="input-group">
                    <label for="registerStudentId">学号</label>
                    <input type="text" id="registerStudentId" placeholder="请输入学号">
                    <div class="error-message" id="registerStudentIdError"></div>
                </div>
                
                <div class="input-group">
                    <label for="registerClass">班级</label>
                    <input type="text" id="registerClass" placeholder="请输入班级">
                    <div class="error-message" id="registerClassError"></div>
                </div>
                
                <div class="input-group">
                    <label for="registerName">学生姓名</label>
                    <input type="text" id="registerName" placeholder="请输入真实姓名">
                    <div class="error-message" id="registerNameError"></div>
                </div>
                
                <div class="input-group">
                    <label for="registerEmail">邮箱</label>
                    <input type="email" id="registerEmail" placeholder="请输入邮箱">
                    <div class="error-message" id="registerEmailError"></div>
                </div>
                
                <div class="input-group">
                    <label for="registerPassword">密码</label>
                    <input type="password" id="registerPassword" placeholder="请设置密码">
                    <div class="error-message" id="registerPasswordError"></div>
                </div>
                
                <div class="input-group">
                    <label for="registerConfirmPassword">确认密码</label>
                    <input type="password" id="registerConfirmPassword" placeholder="请再次输入密码">
                    <div class="error-message" id="registerConfirmPasswordError"></div>
                </div>
                
                <button type="submit" class="btn">注册</button>
                
                <div class="login-options">
                    <a href="login.html">已有账号？立即登录</a>
                </div>
                
                <div class="success-message" id="registerSuccess"></div>
            </form>
        </div>
        
        <div class="footer">
            © 2025 账号中心 | <a href="http://www.xqa.us.ci/privacy.html" style="color: #999;">隐私政策</a>
        </div>
    </div>

    <script>
        // 模拟数据库
        let users = JSON.parse(localStorage.getItem('qqUsers')) || [];
        
        // 注册表单提交
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 获取表单数据
            const studentId = document.getElementById('registerStudentId').value.trim();
            const className = document.getElementById('registerClass').value.trim();
            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            
            // 验证数据
            let isValid = true;
            
            // 清除之前的错误信息
            document.querySelectorAll('#registerForm .error-message').forEach(el => {
                el.style.display = 'none';
            });
            
            // 验证学号
            if (!studentId) {
                document.getElementById('registerStudentIdError').textContent = '学号不能为空';
                document.getElementById('registerStudentIdError').style.display = 'block';
                isValid = false;
            } else if (users.find(user => user.studentId === studentId)) {
                document.getElementById('registerStudentIdError').textContent = '该学号已被注册';
                document.getElementById('registerStudentIdError').style.display = 'block';
                isValid = false;
            }
            
            // 验证班级
            if (!className) {
                document.getElementById('registerClassError').textContent = '班级不能为空';
                document.getElementById('registerClassError').style.display = 'block';
                isValid = true;
            }
            
            // 验证姓名
            if (!name) {
                document.getElementById('registerNameError').textContent = '姓名不能为空';
                document.getElementById('registerNameError').style.display = 'block';
                isValid = false;
            }
            
            // 验证邮箱
            if (!email) {
                document.getElementById('registerEmailError').textContent = '邮箱不能为空';
                document.getElementById('registerEmailError').style.display = 'block';
                isValid = false;
            } else if (!/\S+@\S+\.\S+/.test(email)) {
                document.getElementById('registerEmailError').textContent = '邮箱格式不正确';
                document.getElementById('registerEmailError').style.display = 'block';
                isValid = false;
            } else if (users.find(user => user.email === email)) {
                document.getElementById('registerEmailError').textContent = '该邮箱已被注册';
                document.getElementById('registerEmailError').style.display = 'block';
                isValid = false;
            }
            
            // 验证密码
            if (!password) {
                document.getElementById('registerPasswordError').textContent = '密码不能为空';
                document.getElementById('registerPasswordError').style.display = 'block';
                isValid = false;
            } else if (password.length < 6) {
                document.getElementById('registerPasswordError').textContent = '密码长度不能少于6位';
                document.getElementById('registerPasswordError').style.display = 'block';
                isValid = false;
            }
            
            // 验证确认密码
            if (password !== confirmPassword) {
                document.getElementById('registerConfirmPasswordError').textContent = '两次输入的密码不一致';
                document.getElementById('registerConfirmPasswordError').style.display = 'block';
                isValid = false;
            }
            
            // 如果验证通过，保存用户数据
            if (isValid) {
                const newUser = {
                    studentId,
                    className,
                    name,
                    email,
                    password // 实际应用中应该加密存储
                };
                
                users.push(newUser);
                localStorage.setItem('qqUsers', JSON.stringify(users));
                
                // 显示成功消息
                document.getElementById('registerSuccess').textContent = '注册成功！正在跳转到登录页面...';
                document.getElementById('registerSuccess').style.display = 'block';
                
                // 清空表单
                document.getElementById('registerForm').reset();
                
                // 3秒后自动切换到登录页面
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            }
        });
    </script>
</body>
</html>
