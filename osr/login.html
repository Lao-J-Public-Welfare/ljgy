<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #12c2e9, #c471ed, #f64f59);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 400px;
            max-width: 90%;
            overflow: hidden;
            position: relative;
        }
        
        .header {
            background-color: #1e88e5;
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 500;
        }
        
        .logo {
            width: 60px;
            height: 60px;
            background-color: white;
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: #1e88e5;
            font-weight: bold;
        }
        
        .form-container {
            padding: 20px 30px;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #1e88e5;
            border-bottom: 2px solid #1e88e5;
        }
        
        .form {
            display: none;
        }
        
        .form.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .input-group {
            margin-bottom: 15px;
            position: relative;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            border-color: #1e88e5;
            outline: none;
            box-shadow: 0 0 0 2px rgba(30, 136, 229, 0.2);
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #1e88e5;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        
        .btn:hover {
            background-color: #1565c0;
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .btn-code {
            width: auto;
            padding: 10px 15px;
            white-space: nowrap;
        }
        
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #eee;
        }
        
        .error-message {
            color: #f44336;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .success-message {
            color: #4caf50;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .login-options {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 14px;
        }
        
        .login-options a {
            color: #1e88e5;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .login-options a:hover {
            text-decoration: underline;
            color: #1565c0;
        }
        
        .code-group {
            display: flex;
            gap: 10px;
        }
        
        .code-input {
            flex: 1;
        }
        
        @media (max-width: 480px) {
            .container {
                width: 95%;
            }
            
            .form-container {
                padding: 15px 20px;
            }
            
            .code-group {
                flex-direction: column;
            }
            
            .btn-code {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">梨</div>
            <h1>三高校园墙</h1>
        </div>
        
        <div class="form-container">
            <div class="tabs">
                <div class="tab active" data-tab="login">账号密码登录</div>
                <div class="tab" data-tab="other">其他方式登录</div>
            </div>
            
            <!-- 登录表单 -->
            <form id="loginForm" class="form active">
                <div class="input-group">
                    <label for="loginAccount">账号（学号/邮箱）</label>
                    <input type="text" id="loginAccount" placeholder="请输入学号或邮箱">
                    <div class="error-message" id="loginAccountError"></div>
                </div>
                
                <div class="input-group">
                    <label for="loginPassword">密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码">
                    <div class="error-message" id="loginPasswordError"></div>
                </div>
                
                <button type="submit" class="btn">登录</button>
                
                <div class="login-options">
                    <a href="zhzh.html" id="forgotPassword">忘记密码</a>
                    <a href="register.html" id="switchToRegister">注册新账号</a>
                </div>
                
                <div class="success-message" id="loginSuccess"></div>
            </form>
            
            <!-- 其他登录方式 -->
            <form id="otherForm" class="form">
                <p>暂时不支持其他方式登录，建议使用普通登录方式，为你带来不便，非常抱歉！</p>
                <div class="login-options">
                    <a href="register.html">注册新账号</a>
                   <a id="v37" href="zhzh.html" class="logo">找回密码</a> 
                 </div>
            </form>
        </div>
        
        <div class="footer">
            © 2025 账号中心 | <a href="http://www.xqa.us.ci/privacy.html" style="color: #999;">隐私政策</a>
        </div>
    </div>

    <script>
        // 模拟数据库
        let users = JSON.parse(localStorage.getItem('qqUsers')) || [];
        
        // 标签切换
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                // 移除所有标签的active类
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                // 移除所有表单的active类
                document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
                
                // 给当前点击的标签添加active类
                this.classList.add('active');
                
                // 根据data-tab属性显示对应的表单
                const tabName = this.dataset.tab;
                document.getElementById(tabName + 'Form').classList.add('active');
            });
        });
        
        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 获取表单数据
            const account = document.getElementById('loginAccount').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            // 验证数据
            let isValid = true;
            
            // 清除之前的错误信息
            document.querySelectorAll('#loginForm .error-message').forEach(el => {
                el.style.display = 'none';
            });
            
            // 验证账号
            if (!account) {
                document.getElementById('loginAccountError').textContent = '账号不能为空';
                document.getElementById('loginAccountError').style.display = 'block';
                isValid = false;
            }
            
            // 验证密码
            if (!password) {
                document.getElementById('loginPasswordError').textContent = '密码不能为空';
                document.getElementById('loginPasswordError').style.display = 'block';
                isValid = false;
            }
            
            // 如果验证通过，检查用户是否存在
            if (isValid) {
                const user = users.find(u => 
                    (u.studentId === account || u.email === account) && u.password === password
                );
                
                if (user) {
                    // 登录成功
                    document.getElementById('loginSuccess').textContent = `登录成功！正在跳转...`;
                    document.getElementById('loginSuccess').style.display = 'block';
                    
                    // 保存当前登录用户信息
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    
                    // 2秒后跳转到用户主页
                    setTimeout(() => {
                        window.location.href = 'zycs.html';
                    }, 2000);
                } else {
                    document.getElementById('loginPasswordError').textContent = '账号或密码错误';
                    document.getElementById('loginPasswordError').style.display = 'block';
                }
            }
        });
        
        // 其他登录方式表单提交
        document.getElementById('otherForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phoneLogin').value.trim();
            const code = document.getElementById('verificationCode').value.trim();
            
            if (!phone) {
                alert('请输入手机号');
                return;
            }
            
            if (!code) {
                alert('请输入验证码');
                return;
            }
            
            // 这里可以添加手机号登录的实际逻辑
            alert('手机号登录功能正在开发中，请使用账号密码登录');
        });
        
        // 获取验证码按钮点击事件
        document.getElementById('getCodeBtn').addEventListener('click', function() {
            const phone = document.getElementById('phoneLogin').value.trim();
            
            if (!phone) {
                alert('请输入手机号');
                return;
            }
            
            // 模拟发送验证码
            alert(`验证码已发送到 ${phone}，请注意查收`);
            
            // 倒计时效果
            let countdown = 60;
            const originalText = this.textContent;
            this.disabled = true;
            
            const timer = setInterval(() => {
                this.textContent = `${countdown}秒后重新获取`;
                countdown--;
                
                if (countdown < 0) {
                    clearInterval(timer);
                    this.textContent = originalText;
                    this.disabled = false;
                }
            }, 1000);
        });
    </script>
</body>
</html>
