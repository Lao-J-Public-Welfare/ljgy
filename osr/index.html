<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校墙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #e6f0fa 0%, #cfe3ff 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            color: #1a2b4a;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 20px 40px -12px rgba(0, 60, 120, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        h1 {
            font-size: 4rem;
            font-weight: 600;
            color: #0b2b4a;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 10px rgba(50, 100, 200, 0.3);
        }

        .sub {
            font-size: 1rem;
            color: #2a4a7a;
            margin-bottom: 4rem;
            border-bottom: 2px solid rgba(0, 60, 120, 0.2);
            padding-bottom: 1rem;
            display: inline-block;
        }

        .register-link {
            display: inline-block;
            background: #0b2b4a;
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 500;
            padding: 16px 48px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 20px rgba(0, 40, 100, 0.3);
            transition: all 0.2s ease;
            margin-top: 20px;
        }

        .register-link:hover {
            background: #123b6a;
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 40, 120, 0.4);
        }

        .register-link:active {
            transform: translateY(0);
            box-shadow: 0 8px 20px rgba(0, 40, 100, 0.3);
        }

        .footer {
            margin-top: 3rem;
            color: #3a5a8a;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>校墙</h1>
        <div class="sub">· 校园 · 记忆 · 未来 ·</div>
        
        <a href="http://xq.ljgy123.top/register.html" class="register-link">注册</a>
        
        <div class="footer">
            牢J公益 · 校墙
        </div>
    </div>
</body>
</html>
