<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #12c2e9, #c471ed, #f64f59);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 800px;
            max-width: 90%;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }
        
        .header {
            background-color: #1e88e5;
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 500;
        }
        
        .logo {
            width: 60px;
            height: 60px;
            background-color: white;
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: #1e88e5;
            font-weight: bold;
        }
        
        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        .sidebar {
            width: 250px;
            background-color: #f5f5f5;
            padding: 20px;
            border-right: 1px solid #e0e0e0;
            overflow-y: auto;
        }
        
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        
        .form-container {
            padding: 20px;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #1e88e5;
            border-bottom: 2px solid #1e88e5;
        }
        
        .form {
            display: none;
        }
        
        .form.active {
            display: block;
        }
        
        .input-group {
            margin-bottom: 15px;
            position: relative;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
        }
        
        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            border-color: #1e88e5;
            outline: none;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #1e88e5;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        
        .btn:hover {
            background-color: #1565c0;
        }
        
        .btn-secondary {
            background-color: #6c757d;
        }
        
        .btn-secondary:hover {
            background-color: #545b62;
        }
        
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #eee;
        }
        
        .error-message {
            color: #f44336;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .success-message {
            color: #4caf50;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .user-list {
            list-style-type: none;
        }
        
        .user-item {
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .user-item:hover {
            background-color: #e9ecef;
        }
        
        .user-item.active {
            background-color: #e3f2fd;
            border-left: 3px solid #1e88e5;
        }
        
        .user-info {
            font-size: 14px;
            color: #666;
        }
        
        .user-account {
            font-weight: bold;
            color: #333;
        }
        
        .question-display {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            border-left: 4px solid #1e88e5;
        }
        
        .question-text {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .account-info {
            background-color: #e8f5e9;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            border-left: 4px solid #4caf50;
        }
        
        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
                max-height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">?</div>
        </div>
        
        <div class="content">
            <div class="sidebar">
                <h3>用户账号列表</h3>
                <ul class="user-list" id="userList">
                    <!-- 用户列表将通过JavaScript动态生成 -->
                </ul>
            </div>
            
            <div class="main-content">
                <div class="tabs">
                    <div class="tab active" data-tab="bind">绑定安全问题</div>
                    <div class="tab" data-tab="recover">找回账号</div>
                </div>
                
                <div class="form-container">
                    <!-- 绑定安全问题表单 -->
                    <form id="bindForm" class="form active">
                        <div class="input-group">
                            <label for="account">账号</label>
                            <input type="text" id="account" placeholder="请输入您的账号">
                        </div>
                        
                        <div class="input-group">
                            <label for="question">安全问题</label>
                            <select id="question">
                                <option value="">-- 请选择安全问题 --</option>
                                <option value="custom">自定义问题</option>
                            </select>
                        </div>
                        
                        <div class="input-group" id="customQuestionGroup" style="display: none;">
                            <label for="customQuestion">自定义问题</label>
                            <input type="text" id="customQuestion" placeholder="请输入您的安全问题">
                        </div>
                        
                        <div class="input-group">
                            <label for="answer">答案</label>
                            <input type="text" id="answer" placeholder="请输入安全问题的答案">
                        </div>
                        
                        <button type="submit" class="btn">绑定安全问题</button>
                        <div class="success-message" id="bindSuccess">安全问题绑定成功！</div>
                        <div class="error-message" id="bindError">绑定失败，请检查输入信息。</div>
                    </form>
                    
                    <!-- 找回账号表单 -->
                    <form id="recoverForm" class="form">
                        <div class="input-group">
                            <label for="recoverAccount">账号</label>
                            <input type="text" id="recoverAccount" placeholder="请输入需要找回的账号">
                        </div>
                        
                        <div id="questionDisplay" class="question-display" style="display: none;">
                            <div class="question-text" id="displayedQuestion"></div>
                            <div>请回答此问题以验证身份</div>
                        </div>
                        
                        <div class="input-group">
                            <label for="recoverAnswer">答案</label>
                            <input type="text" id="recoverAnswer" placeholder="请输入安全问题的答案">
                        </div>
                        
                        <button type="submit" class="btn">验证身份</button>
                        <div class="success-message" id="recoverSuccess">验证成功！正在跳转...</div>
                        <div class="error-message" id="recoverError">答案错误，请重新输入。</div>
                        
                        <div id="accountInfo" class="account-info" style="display: none;">
                            <h3>账号信息</h3>
                            <p><strong>账号：</strong><span id="infoAccount"></span></p>
                            <p><strong>安全问题：</strong><span id="infoQuestion"></span></p>
                            <p><strong>绑定时间：</strong><span id="infoTime"></span></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="footer">
            保护账号安全，请谨慎操作 | 账号安全验证系统 v1.0
        </div>
    </div>
    <script>
        // 模拟用户数据存储
        let userAccounts = JSON.parse(localStorage.getItem('userAccounts')) || [];
        
        // DOM元素
        const userList = document.getElementById('userList');
        const tabs = document.querySelectorAll('.tab');
        const forms = document.querySelectorAll('.form');
        const bindForm = document.getElementById('bindForm');
        const recoverForm = document.getElementById('recoverForm');
        const questionSelect = document.getElementById('question');
        const customQuestionGroup = document.getElementById('customQuestionGroup');
        const customQuestionInput = document.getElementById('customQuestion');
        const recoverAccountInput = document.getElementById('recoverAccount');
        const questionDisplay = document.getElementById('questionDisplay');
        const displayedQuestion = document.getElementById('displayedQuestion');
        const accountInfo = document.getElementById('accountInfo');
        
        // 初始化用户列表
        function renderUserList() {
            userList.innerHTML = '';
            
            if (userAccounts.length === 0) {
                userList.innerHTML = '<li class="user-item">暂无绑定的账号</li>';
                return;
            }
            
            userAccounts.forEach((user, index) => {
                const li = document.createElement('li');
                li.className = 'user-item';
                li.innerHTML = `
                    <div class="user-account">${user.account}</div>
                    <div class="user-info">${user.question}</div>
                `;
                li.addEventListener('click', () => {
                    // 移除所有active类
                    document.querySelectorAll('.user-item').forEach(item => {
                        item.classList.remove('active');
                    });
                    // 添加active类到当前项
                    li.classList.add('active');
                    // 显示账号信息
                    showAccountInfo(user);
                });
                userList.appendChild(li);
            });
        }
        
        // 显示账号信息
        function showAccountInfo(user) {
            document.getElementById('infoAccount').textContent = user.account;
            document.getElementById('infoQuestion').textContent = user.question;
            document.getElementById('infoTime').textContent = new Date(user.timestamp).toLocaleString();
            accountInfo.style.display = 'block';
        }
        
        // 选项卡切换
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const tabId = tab.getAttribute('data-tab');
                
                // 更新选项卡状态
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                // 更新表单显示
                forms.forEach(form => form.classList.remove('active'));
                document.getElementById(`${tabId}Form`).classList.add('active');
                
                // 重置表单和消息
                resetForms();
            });
        });
        
        // 自定义问题显示/隐藏
        questionSelect.addEventListener('change', function() {
            if (this.value === 'custom') {
                customQuestionGroup.style.display = 'block';
            } else {
                customQuestionGroup.style.display = 'none';
            }
        });
        
        // 绑定安全问题表单提交
        bindForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const account = document.getElementById('account').value.trim();
            let question = questionSelect.value;
            const answer = document.getElementById('answer').value.trim();
            
            // 验证输入
            if (!account || !answer) {
                showMessage('bindError', '请填写所有必填字段');
                return;
            }
            
            if (question === 'custom') {
                question = customQuestionInput.value.trim();
                if (!question) {
                    showMessage('bindError', '请输入自定义问题');
                    return;
                }
            }
            
            if (!question) {
                showMessage('bindError', '请选择安全问题');
                return;
            }
            
            // 检查账号是否已存在
            const existingUserIndex = userAccounts.findIndex(user => user.account === account);
            
            if (existingUserIndex !== -1) {
                // 更新现有账号
                userAccounts[existingUserIndex] = {
                    account,
                    question,
                    answer,
                    timestamp: Date.now()
                };
            } else {
                // 添加新账号
                userAccounts.push({
                    account,
                    question,
                    answer,
                    timestamp: Date.now()
                });
            }
            
            // 保存到本地存储
            localStorage.setItem('userAccounts', JSON.stringify(userAccounts));
            
            // 显示成功消息
            showMessage('bindSuccess', '安全问题绑定成功！');
            
            // 重置表单
            bindForm.reset();
            customQuestionGroup.style.display = 'none';
            
            // 更新用户列表
            renderUserList();
        });
        
        // 找回账号表单提交
        recoverForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const account = recoverAccountInput.value.trim();
            const answer = document.getElementById('recoverAnswer').value.trim();
            
            // 验证输入
            if (!account || !answer) {
                showMessage('recoverError', '请填写所有必填字段');
                return;
            }
            
            // 查找用户
            const user = userAccounts.find(user => user.account === account);
            
            if (!user) {
                showMessage('recoverError', '账号不存在');
                return;
            }
            
            // 验证答案
            if (user.answer !== answer) {
                showMessage('recoverError', '答案错误，请重新输入');
                return;
            }
            
            // 验证成功
            showMessage('recoverSuccess', '验证成功！正在跳转...');
            
            // 模拟跳转
            setTimeout(() => {
                alert(`账号 ${account} 验证成功！`);
                recoverForm.reset();
                questionDisplay.style.display = 'none';
                document.getElementById('recoverSuccess').style.display = 'none';
            }, 1500);
        });
        
        // 监听找回账号输入框变化
        recoverAccountInput.addEventListener('input', function() {
            const account = this.value.trim();
            const user = userAccounts.find(user => user.account === account);
            
            if (user) {
                displayedQuestion.textContent = user.question;
                questionDisplay.style.display = 'block';
            } else {
                questionDisplay.style.display = 'none';
            }
            
            // 隐藏错误消息
            document.getElementById('recoverError').style.display = 'none';
        });
        
        // 显示消息
        function showMessage(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.style.display = 'block';
            
            // 隐藏其他消息
            const messages = document.querySelectorAll('.error-message, .success-message');
            messages.forEach(msg => {
                if (msg.id !== elementId) {
                    msg.style.display = 'none';
                }
            });
        }
        
        // 重置表单
        function resetForms() {
            bindForm.reset();
            recoverForm.reset();
            customQuestionGroup.style.display = 'none';
            questionDisplay.style.display = 'none';
            accountInfo.style.display = 'none';
            
            // 隐藏所有消息
            const messages = document.querySelectorAll('.error-message, .success-message');
            messages.forEach(msg => {
                msg.style.display = 'none';
            });
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderUserList();
        });
    </script>
</body>
</html>
