<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>姐，生日快乐！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe6f0 0%, #ffb6c1 100%);
            font-family: 'Segoe UI', 'Comic Neue', 'PingFang SC', Roboto, sans-serif;
            overflow-x: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .kitty-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="45" r="25" fill="%23ff99aa"/><circle cx="35" cy="40" r="4" fill="white"/><circle cx="65" cy="40" r="4" fill="white"/><circle cx="37" cy="41" r="2" fill="black"/><circle cx="63" cy="41" r="2" fill="black"/><path d="M45 55 Q50 65 55 55" stroke="%23ff6699" stroke-width="3" fill="none"/><path d="M35 30 L30 25 M65 30 L70 25" stroke="%23ff6699" stroke-width="3" fill="none"/><path d="M48 25 L52 25" stroke="%23ff88aa" stroke-width="4"/><polygon points="50,20 53,28 62,28 55,33 58,42 50,37 42,42 45,33 38,28 47,28" fill="%23ffcc00"/></svg>');
            background-repeat: repeat;
            background-size: 80px;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            width: 100%;
            background: rgba(255, 250, 245, 0.92);
            backdrop-filter: blur(3px);
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 40px 30px 60px;
            text-align: center;
            border: 2px solid rgba(255, 182, 193, 0.6);
        }

        h1 {
            font-size: 3rem;
            color: #ff6699;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0 #ffe0e7;
        }

        .sub {
            font-size: 1.2rem;
            color: #b3456b;
            margin-bottom: 30px;
            border-bottom: 2px dashed #ffb6c1;
            display: inline-block;
            padding-bottom: 8px;
        }

        .words-container {
            min-height: 300px;
            margin: 30px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .word-bubble {
            background: white;
            border-radius: 60px;
            padding: 10px 18px;
            font-size: 1rem;
            font-weight: 500;
            color: #c94f6f;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            border: 1px solid #ffe0e7;
            animation: popIn 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
            display: inline-block;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.2);
                opacity: 0;
            }
            70% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .heart {
            margin-top: 30px;
            font-size: 2rem;
            animation: heartbeat 1.5s infinite;
            color: #ff99bb;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .counter {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #e68a9e;
            background: #fff0f3;
            display: inline-block;
            padding: 5px 18px;
            border-radius: 50px;
        }

        .footer-note {
            margin-top: 35px;
            font-size: 0.9rem;
            color: #e68a9e;
            background: #fff0f3;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
        }
    </style>
</head>
<body>
<div class="kitty-bg"></div>
<div class="container">
    <h1 class="floating">🎀 姐，祝你快乐 🎀</h1>
    <div class="sub">✨ 全世界最可爱的你 ✨</div>

    <div class="words-container" id="wordsContainer"></div>
    <div class="counter" id="counter">✨ 祝福加载中 ✨</div>

    <div class="heart">❤️ 🎂 🎁 💖</div>
    <div class="footer-note">🎈 永远开心，永远被爱 🎈</div>
</div>

<script>
    // 100 个祝福形容词（保留原样）
    const blessings = [
        "可爱的", "温柔的", "善良的", "美丽的", "大方的", "开朗的", "明媚的", "灿烂的", "优雅的", "自信的",
        "勇敢的", "坚强的", "聪慧的", "灵气的", "甜美的", "清新的", "阳光的", "明亮的", "温暖的", "亲切的",
        "真诚的", "坦率的", "爽朗的", "大气的", "爽快的", "热情的", "热心的", "体贴的", "细心的", "耐心的",
        "包容的", "豁达的", "淡然的", "从容的", "知性的", "独立的", "洒脱的", "率真的", "纯真的", "天真的",
        "灵动的", "俏皮的", "调皮的", "活泼的", "元气满满的", "积极向上的", "乐观的", "豁达的", "平和的", "安稳的",
        "富足的", "丰盈的", "闪亮的", "发光的", "耀眼的", "璀璨的", "夺目的", "惊艳的", "迷人的", "醉人的",
        "心动的", "美好的", "极好的", "超棒的", "厉害的", "优秀的", "出色的", "卓越的", "不凡的", "独特的",
        "特别的", "珍贵的", "宝贵的", "无价的", "独一无二的", "不可替代的", "值得被爱的", "被宠爱的", "被珍惜的", "被守护的",
        "幸运的", "幸福的", "满足的", "喜悦的", "快乐的", "欢愉的", "轻盈的", "自由的", "自在的", "舒展的",
        "圆满的", "顺遂的", "安康的", "吉祥的", "如意的", "兴旺的", "腾达的", "璀璨的", "绚烂的", "绽放的"
    ];

    // 随机打乱顺序
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    const shuffled = shuffleArray([...blessings]);
    const container = document.getElementById('wordsContainer');
    const counterSpan = document.getElementById('counter');
    let index = 0;

    // 弹窗
    window.addEventListener('load', () => {
        alert('🎀 姐生日快乐！🎀');
        // 开始一个一个蹦祝福
        showNextWord();
    });

    function showNextWord() {
        if (index >= shuffled.length) {
            counterSpan.innerHTML = '🎉 100个祝福全部送给你！ 🎉';
            return;
        }

        // 更新计数器
        counterSpan.innerHTML = `✨ 第 ${index + 1} / 100 个祝福 ✨`;

        // 创建新的祝福气泡
        const wordDiv = document.createElement('div');
        wordDiv.className = 'word-bubble';
        wordDiv.textContent = shuffled[index];
        container.appendChild(wordDiv);

        // 自动滚动到最新祝福
        wordDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        index++;

        // 每 0.25 秒蹦出一个，100 个约 25 秒播完，视觉舒服
        setTimeout(showNextWord, 100);
    }
</script>
</body>
</html>
