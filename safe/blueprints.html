<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFE · 优质蓝图</title>
    <!-- Font Awesome 精简图标库 (仅使用几个图标) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI','PingFang SC',sans-serif;}
        body{background:#0a0f1e;color:#e0e5f0;line-height:1.5;}
        .navbar{
            position:fixed;top:0;width:100%;background:rgba(10,15,30,0.9);backdrop-filter:blur(8px);
            border-bottom:1px solid #1e3a5f;padding:0.8rem 5%;display:flex;justify-content:space-between;
            align-items:center;z-index:1000;
        }
        .logo{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,#7aa5ff,#ff9f4b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .nav-links{display:flex;gap:1.5rem;}
        .nav-links a{color:#ccd9f0;text-decoration:none;font-size:1rem;}
        .nav-links a:hover{color:#ff9f4b;border-bottom:2px solid #ff9f4b;}
        .navbar-placeholder{height:65px;}
        .container{max-width:1000px;margin:2rem auto;padding:1rem;}
        h1{font-size:2.5rem;text-align:center;background:linear-gradient(135deg,#fff,#7aa5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.5rem;}
        .sub{text-align:center;color:#b0c8ff;margin-bottom:2rem;font-size:1.2rem;}
        .features{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin:2rem 0;}
        .card{background:rgba(20,30,50,0.6);border:1px solid #2e4a7a;border-radius:12px;padding:1.2rem;}
        .card i{color:#ff9f4b;font-size:1.8rem;margin-bottom:0.5rem;}
        .card h3{font-size:1.3rem;margin-bottom:0.5rem;}
        .card p{color:#b5c9ff;font-size:0.9rem;}
        .quote{background:#1b2538;border-left:4px solid #ff9f4b;padding:1rem;margin:2rem 0;border-radius:0 12px 12px 0;}
        .quote i{color:#ff9f4b;margin-right:6px;}
        .footer{text-align:center;padding:1.5rem;border-top:1px solid #1e3a5f;color:#7f8fa0;font-size:0.9rem;}
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">SAFE航天局</div>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="version.html">宇航员版</a>
            <a href="blueprints.html">优质蓝图</a>
            <a href="community.html">加入社群</a>
        </div>
    </div>
    <div class="navbar-placeholder"></div>

    <div class="container">
        <h1>📐 优质蓝图</h1>
        <div class="sub">千锤百炼 · 毫厘级精度</div>

        <div class="features">
            <div class="card">
                <i class="fas fa-ruler"></i>
                <h3>毫厘级精度</h3>
                <p>重力转弯算法精准至毫厘，省油更省心。</p>
            </div>
            <div class="card">
                <i class="fas fa-layer-group"></i>
                <h3>冗余设计</h3>
                <p>逃生塔、备份系统，让小人安心回家。</p>
            </div>
            <div class="card">
                <i class="fas fa-rocket"></i>
                <h3>运力冠绝</h3>
                <p>三级构型、千吨级推力，突破限制。</p>
            </div>
            <div class="card">
                <i class="fas fa-eye"></i>
                <h3>全景视野</h3>
                <p>特制返回舱舷窗，回望地球。</p>
            </div>
        </div>

        <div class="quote">
            <i class="fas fa-quote-left"></i> 推力大、震动小、还有全景舷窗看地球 —— 让小人笑着上天，笑着回家
        </div>

        <p style="text-align:center; color:#7f8fa0; margin:2rem 0 1rem;">用优质设计，致敬每一份探索的勇气</p>
    </div>

    <div class="footer">
        © 2026 SAFE航天局 · 蓝图即航道
    </div>
</body>
</html>
