<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFE航天局 · 首页</title>
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        body {
            background-color: #0a0f1e;
            color: #e0e5f0;
            line-height: 1.6;
        }
        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 15, 30, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #1e3a5f;
            z-index: 1000;
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #7aa5ff, #ff9f4b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        .nav-links a {
            color: #ccd9f0;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            font-size: 1.1rem;
        }
        .nav-links a:hover {
            color: #ff9f4b;
            border-bottom: 2px solid #ff9f4b;
        }
        /* 首页英雄区 */
        .hero {
            height: 100vh;
            background: radial-gradient(ellipse at 70% 30%, #1b2b4a, #0a0f1e);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5%;
        }
        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 800;
            line-height: 1.2;
            text-shadow: 0 0 20px #3a6ea5;
        }
        .hero h1 span {
            background: linear-gradient(135deg, #fff, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        .hero .sub {
            font-size: 1.5rem;
            margin: 1.5rem 0 2rem;
            color: #b0c8ff;
            max-width: 800px;
        }
        .hero .btn {
            background: transparent;
            border: 2px solid #ff9f4b;
            color: #ff9f4b;
            padding: 1rem 3rem;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
        }
        .hero .btn:hover {
            background: #ff9f4b;
            color: #0a0f1e;
            box-shadow: 0 0 30px #ff9f4b;
        }
        /* 页脚 */
        .footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid #1e3a5f;
            color: #7f8fa0;
        }
        /* 导航占位 */
        .navbar-placeholder {
            height: 70px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">SAFE 航天局</div>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="version.html">宇航员版</a>
            <a href="blueprints.html">优质蓝图</a>
            <a href="community.html">加入社群</a>
        </div>
    </div>
    <div class="navbar-placeholder"></div>

    <!-- 首页英雄区 -->
    <section class="hero">
        <h1>
            <span>告别无人深空</span><br>
            SFS 迎来载人纪元！
        </h1>
        <div class="sub">
            我们不仅在游戏里摸透了物理定律，更打造出宇航员版本的终极座驾。<br>
            从逃生塔到生命维持，每一处细节都是优质蓝图的结晶。
        </div>
        <a href="version.html" class="btn">探索宇航员版本 <i class="fas fa-rocket" style="margin-left: 10px;"></i></a>
    </section>

    <div class="footer">
        © 2026 SAFE航天局 · 人类（小人）的一小步，你的一大步
    </div>
</body>
</html>
