<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFE航天局 · 宇航员版本</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        body {
            background-color: #0a0f1e;
            color: #e0e5f0;
            line-height: 1.6;
        }
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 15, 30, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #1e3a5f;
            z-index: 1000;
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #7aa5ff, #ff9f4b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        .nav-links a {
            color: #ccd9f0;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            font-size: 1.1rem;
        }
        .nav-links a:hover {
            color: #ff9f4b;
            border-bottom: 2px solid #ff9f4b;
        }
        .navbar-placeholder {
            height: 70px;
        }
        .page-header {
            text-align: center;
            padding: 3rem 1rem 2rem;
        }
        .page-header h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        .page-header p {
            font-size: 1.3rem;
            color: #b0c8ff;
            max-width: 700px;
            margin: 0 auto;
        }
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            padding: 2rem 5% 4rem;
        }
        .card {
            background: rgba(20, 30, 50, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid #2e4a7a;
            border-radius: 20px;
            padding: 2rem;
            width: 300px;
            transition: 0.3s;
        }
        .card:hover {
            transform: translateY(-10px);
            border-color: #ff9f4b;
            box-shadow: 0 10px 30px rgba(255, 159, 75, 0.2);
        }
        .card i {
            font-size: 3rem;
            color: #ff9f4b;
            margin-bottom: 1rem;
        }
        .card h3 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #ffffff;
        }
        .card p {
            color: #b5c9ff;
        }
        .footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid #1e3a5f;
            color: #7f8fa0;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">SAFE 航天局</div>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="version.html">宇航员版</a>
            <a href="blueprints.html">优质蓝图</a>
            <a href="community.html">加入社群</a>
        </div>
    </div>
    <div class="navbar-placeholder"></div>

    <div class="page-header">
        <h1>👨‍🚀 宇航员版本 · 载人深空新标杆</h1>
        <p>不止是火箭，更是人类勇气的延伸</p>
    </div>

    <div class="cards-container">
        <!-- 卡片1：霸气侧漏 -->
        <div class="card">
            <i class="fas fa-user-astronaut"></i>
            <h3>载人纪元</h3>
            <p>告别无人深空，SFS迎来载人纪元！我们打造出宇航员版本的终极座驾，让人类足迹抵达更远的星辰。</p>
        </div>
        <!-- 卡片2：硬核技术 -->
        <div class="card">
            <i class="fas fa-cogs"></i>
            <h3>超强运力</h3>
            <p>突破游戏引擎极限，大推力级间分离，运载能力冠绝群雄。优质重力转弯算法，毫厘之间的精准。</p>
        </div>
        <!-- 卡片3：生命保障 -->
        <div class="card">
            <i class="fas fa-heartbeat"></i>
            <h3>生命维持</h3>
            <p>针对“小人”特制的返回舱与生命保障系统，冗余设计的返回舱，确保每一趟旅程安然无恙。</p>
        </div>
        <!-- 卡片4：优质蓝图 -->
        <div class="card">
            <i class="fas fa-drafting-compass"></i>
            <h3>千锤百炼</h3>
            <p>我们交付的不只是火箭，更是经过千锤百炼的优质蓝图。从近地轨道到深空移民，用优质设计致敬探索。</p>
        </div>
    </div>

    <div class="footer">
        <i class="fas fa-quote-right"></i> 这一小步，是你SFS生涯的一大步
    </div>
</body>
</html>
