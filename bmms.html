<!DOCTYPE html> <html lang="zh"> <head> <meta charset="UTF-8"> <meta 
    name="viewport" content="width=device-width, initial-scale=1.0, 
    maximum-scale=1.0, user-scalable=no"> <title>🦖 小恐龙 · 
    手机版</title> <style>
        * { margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; user-select: none;
        }
        body { background: linear-gradient(145deg, #2b2b3a 0%, #1f1f2b 
            100%); min-height: 100vh; display: flex; justify-content: 
            center; align-items: center; font-family: 'Courier New', 
            Courier, monospace; padding: 10px;
        }
        .game-container { background: #f7f7f4; border-radius: 2rem; 
            padding: 1.2rem 1.2rem 1.5rem; box-shadow: 0 20px 30px 
            rgba(0,0,0,0.6); width: 100%; max-width: 500px;
        }
        canvas { display: block; width: 100%; height: auto; 
            background-color: #eaece5; border-radius: 20px; box-shadow: 
            inset 0 -2px 8px rgba(0,0,0,0.1); cursor: pointer; 
            touch-action: none;
        }
        .info-panel { display: flex; flex-wrap: wrap; justify-content: 
            space-between; align-items: center; margin: 15px 0 0; gap: 
            10px;
        }
        .score-box { background: #c0c6b3; padding: 6px 15px; 
            border-radius: 40px; box-shadow: inset 0 -3px 0 #7e8a6e, 0 5px 
            0 #3d3f3a; color: #1e2b1e; letter-spacing: 2px; font-size: 
            1.2rem;
        }
        .hint { display: flex; flex-wrap: wrap; gap: 8px; align-items: 
            center; font-size: 0.9rem;
        }
        .hint kbd { background: #2d2d34; color: #fadf9e; padding: 4px 
            10px; border-radius: 30px; font-size: 0.9rem; font-weight: 
            700; box-shadow: 0 4px 0 #111;
        }
        .hint span { background: #b3bca8; border-radius: 30px; padding: 
            4px 12px; font-size: 0.8rem; box-shadow: inset 0 -2px 0 
            #6f7c62;
        }
        button { background: #d08e6b; border: none; font-family: inherit; 
            font-weight: bold; font-size: 1.1rem; padding: 8px 20px; 
            border-radius: 50px; box-shadow: 0 5px 0 #8b5a40, 0 8px 12px 
            black; color: #261c13; cursor: pointer; transition: 0.05s 
            ease; min-width: 100px; touch-action: manipulation;
        }
        button:active { transform: translateY(5px); box-shadow: 0 2px 0 
            #8b5a40, 0 5px 10px black;
        }
        .footer { text-align: center; margin-top: 15px; color: #cdcfc3; 
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="500" height="200"></canvas>

    <div class="info-panel">
        <div class="score-box">
            <span id="scoreDisplay">0000</span>
        </div>
        <div class="hint">
            <kbd>⬆️</kbd>
            <kbd>⬇️</kbd>
            <kbd>F</kbd>
        </div>
        <button id="restartBtn">🔄 重来</button>
    </div>
    <div class="footer">
        👆 点屏幕起跳 · 点按钮重开
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const restartBtn = document.getElementById('restartBtn');

        // 手机版参数
        const GROUND_Y = 170;
        const DINO_WIDTH = 18;
        const DINO_HEIGHT = 22;
        const DINO_X = 50;

        let dino = {
            x: DINO_X,
            y: GROUND_Y - DINO_HEIGHT,
            width: DINO_WIDTH,
            height: DINO_HEIGHT,
            isJumping: false,
            jumpVelocity: 0,
            gravity: 0.5,
            isDucking: false,
            normalHeight: DINO_HEIGHT,
            duckHeight: 14
        };

        let obstacles = [];
        let gameRunning = true;
        let gameOver = false;
        let frameCount = 0;
        let score = 0;
        let speed = 4;
        const MAX_SPEED = 10;
        let nightMode = false;
        let lastSpawnFrame = 0;
        const MIN_SPAWN_INTERVAL = 50;
function updateScoreDisplay() {
    let str = String(Math.floor(score)).padStart(4, '0').slice(0, 4);
    scoreSpan.textContent = str;
}

function resetGame() {
    gameRunning = true;
    gameOver = false;
    obstacles = [];
    dino.y = GROUND_Y - dino.normalHeight;
    dino.isJumping = false;
    dino.jumpVelocity = 0;
    dino.isDucking = false;
    dino.height = dino.normalHeight;
    frameCount = 0;
    score = 0;
    speed = 4;
    lastSpawnFrame = 0;
    updateScoreDisplay();
}

function spawnObstacle() {
    const type = Math.random() < 0.6 ? 'cactus' : 'pterodactyl';
    let width, height, y;
    if (type === 'cactus') {
        width = 10 + Math.floor(Math.random() * 6);
        height = 16 + Math.floor(Math.random() * 8);
        y = GROUND_Y - height;
    } else {
        width = 18;
        height = 12;
        y = Math.random() < 0.5 ? GROUND_Y - 20 : GROUND_Y - 35;
    }
    obstacles.push({
        x: 500,
        width: width,
        height: height,
        y: y,
        type: type,
        passed: false
    });
}

function rectCollide(x1, y1, w1, h1, x2, y2, w2, h2) {
    return (x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2);
}

function updateGame() {
    if (!gameRunning || gameOver) return;

    score += 0.15;
    speed = Math.min(MAX_SPEED, 4 + Math.floor(score / 200));
    updateScoreDisplay();

    if (dino.isJumping) {
        dino.y += dino.jumpVelocity;
        dino.jumpVelocity += dino.gravity;
        if (dino.y >= GROUND_Y - dino.height) {
            dino.y = GROUND_Y - dino.height;
            dino.isJumping = false;
            dino.jumpVelocity = 0;
        }
    } else {
        dino.y = GROUND_Y - dino.height;
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= speed;
        if (obstacles[i].x + obstacles[i].width < 0) {
            obstacles.splice(i, 1);
        }
    }

    if (frameCount - lastSpawnFrame > MIN_SPAWN_INTERVAL) {
        if (Math.random() < 0.02 && obstacles.length < 3) {
            spawnObstacle();
            lastSpawnFrame = frameCount;
        }
    }

    for (let obs of obstacles) {
        if (rectCollide(dino.x, dino.y, dino.width, dino.height, obs.x, obs.y, obs.width, obs.height)) {
            gameRunning = false;
            gameOver = true;
            break;
        }
    }

    frameCount++;
}
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = nightMode ? '#263238' : '#eaece5';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 地面
            ctx.fillStyle = nightMode ? '#3f4a51' : '#6d6d5e';
            ctx.fillRect(0, GROUND_Y, canvas.width, 3);
            ctx.fillStyle = nightMode ? '#65737e' : '#8e8d7c';
            ctx.fillRect(0, GROUND_Y + 3, canvas.width, 2);

            // 障碍物
            ctx.fillStyle = nightMode ? '#51745c' : '#2f6b3a';
            obstacles.forEach(obs => {
                if (obs.type === 'cactus') {
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                } else {
                    ctx.fillStyle = nightMode ? '#6e6e7c' : '#4f4f66';
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                }
            });

            // 恐龙
            ctx.fillStyle = nightMode ? '#b0b79e' : '#3b3b34';
            ctx.fillRect(dino.x, dino.y, dino.width, dino.height);
            
            // 眼睛
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(dino.x + 13, dino.y + 5, 2.5, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.arc(dino.x + 14, dino.y + 4, 1.2, 0, 2 * Math.PI);
            ctx.fill();

            // 夜晚效果
            if (nightMode) {
                ctx.fillStyle = 'rgba(30,40,70,0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 得分
            ctx.font = 'bold 10px monospace';
            ctx.fillStyle = '#4d4d42';
            ctx.fillText('SPD: ' + speed.toFixed(1), 400, 20);
        }

        function gameLoop() {
            if (gameRunning) updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 键盘控制
        window.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'ArrowUp') {
                e.preventDefault();
                if (!dino.isJumping && !dino.isDucking && gameRunning) {
                    dino.isJumping = true;
                    dino.jumpVelocity = -9;
                }
            }
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (!dino.isJumping && gameRunning) {
                    dino.isDucking = true;
                    dino.height = dino.duckHeight;
                }
            }
            if (e.key === 'f' || e.key === 'F') {
                nightMode = !nightMode;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                dino.isDucking = false;
                dino.height = dino.normalHeight;
            }
        });

        // 触摸控制（手机用）
        canvas.addEventListener('click', () => {
            if (!gameRunning) {
                resetGame();
            } else if (!dino.isJumping) {
                dino.isJumping = true;
                dino.jumpVelocity = -9;
            }
        });

        restartBtn.addEventListener('click', resetGame);

        resetGame();
        gameLoop();
    })();
</script>
</body>
</html>
