        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI','PingFang SC',sans-serif;}
        body{background:#0a0f1e;color:#e0e5f0;line-height:1.5;}
        .navbar{
            position:fixed;top:0;width:100%;background:rgba(10,15,30,0.9);backdrop-filter:blur(8px);
            border-bottom:1px solid #1e3a5f;padding:0.8rem 5%;display:flex;justify-content:space-between;

        .nav-links a{color:#ccd9f0;text-decoration:none;font-size:1rem;}
        .nav-links a:hover{color:#ff9f4b;border-bottom:2px solid #ff9f4b;}
        .navbar-placeholder{height:65px;}
        .container{max-width:700px;margin:2rem auto;padding:1rem;text-align:center;}
        .box{background:rgba(16,24,40,0.8);border:2px solid #2e4a7a;border-radius:30px;padding:2rem 1.5rem;}
        h1{font-size:2.5rem;color:#ff9f4b;margin-bottom:0.5rem;}
        .group-name{font-size:1.8rem;background:linear-gradient(135deg,#fff,#b0c8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0.5rem 0;}
        .stats{display:flex;justify-content:center;gap:1.5rem;margin:1.5rem 0;flex-wrap:wrap;}
        .stat{background:#1e2a3a;border-radius:20px;padding:0.5rem 1.2rem;}
        .stat .num{font-size:1.8rem;font-weight:700;color:#ff9f4b;}
        .stat .label{color:#a0b5e0;font-size:0.8rem;}
        .btn{
            display:inline-block;background:#ff9f4b;color:#0a0f1e;font-size:1.6rem;font-weight:bold;
            padding:0.8rem 2.5rem;border-radius:50px;text-decoration:none;margin:1.5rem 0 1rem;
            border:2px solid #ff9f4b;transition:0.3s;
        }
        .btn:hover{background:transparent;color:#ff9f4b;}
        .info{color:#b0c8ff;margin:1rem 0;}
        .info i{color:#ff9f4b;width:24px;}
        .qr-placeholder{
            width:160px;height:160px;margin:1rem auto;background:#1b2538;border-radius:20px;
            border:2px solid #ff9f4b;display:flex;flex-direction:column;align-items:center;justify-content:center;
            color:#ff9f4b;
        }
        .qr-placeholder i{font-size:3rem;}
        .footer{text-align:center;padding:1.5rem;border-top:1px solid #1e3a5f;color:#7f8fa0;font-size:0.9rem;}
