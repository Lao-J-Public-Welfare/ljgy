<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牢J公益</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
        }
        h1 {
            color: #3498db;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        .sub {
            color: #666;
            margin-bottom: 20px;
            font-size: 0.85rem;
            border-left: 3px solid #3498db;
            padding-left: 12px;
        }
        canvas {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: crosshair;
            background: white;
            display: block;
            margin-bottom: 15px;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        .btn {
            background: #2c3e2f;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn:hover {
            background: #1e2a21;
        }
        .btn-blue {
            background: #3498db;
        }
        .btn-blue:hover {
            background: #2980b9;
        }
        .color-picker {
            width: 40px;
            height: 40px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
        }
        .size-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back {
            display: inline-block;
            margin-top: 15px;
            color: #3498db;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>在线画板</h1>
      
        <canvas id="canvas" width="800" height="500" style="width:100%; height:auto; max-width:800px"></canvas>

        <div class="toolbar">
            <button class="btn btn-blue" onclick="setColor('#000000')">黑色</button>
            <button class="btn btn-blue" onclick="setColor('#ff0000')">红色</button>
<button class="btn btn-blue" onclick="setColor('#00ff00')">绿色</button> <button 
            class="btn btn-blue" onclick="setColor('#0000ff')">蓝色</button>             <input type="color" id="colorPicker" class="color-picker" 
            value="#000000"> <div class="size-control">
                <span>笔刷</span>
                <input type="range" id="brushSize" min="1" max="20" value="3">
            </div>
            <button class="btn btn-blue" onclick="clearCanvas()">清空</button>
            <button class="btn btn-blue" onclick="saveCanvas()">保存图片</button>
        </div>

        <a href="index.php" class="back">← 返回官网</a>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let painting = false;
    let currentColor = '#000000';
    let currentSize = 3;

    function resizeCanvas() {
        const container = canvas.parentElement;
        const maxWidth = container.clientWidth - 40;
        if (maxWidth < 800) {
            canvas.style.width = maxWidth + 'px';
            canvas.style.height = 'auto';
        } else {
            canvas.style.width = '800px';
            canvas.style.height = 'auto';
        }
    }

    function startPosition(e) {
        painting = true;
        draw(e);
    }

    function endPosition() {
        painting = false;
        ctx.beginPath();
    }

    function draw(e) {
        if (!painting) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let x, y;
        if (e.touches) {
            x = (e.touches[0].clientX - rect.left) * scaleX;
            y = (e.touches[0].clientY - rect.top) * scaleY;
        } else {
            x = (e.clientX - rect.left) * scaleX;
            y = (e.clientY - rect.top) * scaleY;
        }
        ctx.lineWidth = currentSize;
        ctx.lineCap = 'round';
        ctx.strokeStyle = currentColor;
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    function setColor(color) {
        currentColor = color;
        document.getElementById('colorPicker').value = color;
    }

    document.getElementById('colorPicker').addEventListener('change', function(e) {
        currentColor = e.target.value;
    });

    document.getElementById('brushSize').addEventListener('change', function(e) {
        currentSize = e.target.value;
    });

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function saveCanvas() {
        const link = document.createElement('a');
        link.download = 'drawing.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    canvas.addEventListener('mousedown', startPosition);
    canvas.addEventListener('mouseup', endPosition);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('touchstart', startPosition);
    canvas.addEventListener('touchend', endPosition);
    canvas.addEventListener('touchmove', draw);

    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
</script>
</body>
</html>
