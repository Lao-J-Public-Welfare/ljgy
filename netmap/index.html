<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牢J公益 · 网络拓扑墙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: white;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .container {
            width: 1100px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            padding: 28px;
            border: 1px solid #eef2f5;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 500;
            color: #c0392b;
            margin-bottom: 8px;
        }
        .sub {
            color: #5a6874;
            font-size: 0.8rem;
            margin-bottom: 28px;
            border-left: 3px solid #c0392b;
            padding-left: 14px;
        }
        .topology {
            position: relative;
            min-height: 500px;
            margin: 20px 0 30px;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .nodes {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 460px;
        }
        .node {
            background: white;
            border-radius: 60px;
            padding: 16px 24px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
            text-align: center;
            min-width: 140px;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        .node h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #2c3e2f;
            margin-bottom: 8px;
        }
        .node p {
            font-size: 0.7rem;
            color: #7c8b9c;
        }
        .firewall {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 16px 24px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .firewall.active {
            background: #ecfdf5;
            border-color: #2c5a2e;
            box-shadow: 0 0 0 2px #2c5a2e20;
        }
        .firewall span {
            font-size: 0.9rem;
            font-weight: 500;
            color: #2c3e2f;
        }
        .status-badge {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 10px;
            margin-right: 8px;
            background: #cbd5e1;
        }
        .control-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        button {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            color: #2c3e2f;
        }
        button:hover {
            background: #f1f5f9;
            border-color: #c0392b;
        }
        .attack-badge {
            background: #c0392b;
            color: white;
            border: none;
        }
        .footer {
            text-align: center;
            font-size: 0.65rem;
            color: #9aaebf;
            margin-top: 32px;
            border-top: 1px solid #eef2f5;
            padding-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>牢J公益 · 网络拓扑墙</h1>
    <div class="sub">用户 → 防火墙 → 服务器 | 绿色脉冲为正常访问，红色为攻击</div>

    <div class="topology">
        <canvas id="networkCanvas" width="1000" height="460" style="width:100%; height:460px"></canvas>
        <div class="nodes">
            <div class="node" id="user1">
                <h3>普通用户</h3>
                <p>192.168.1.10</p>
            </div>
            <div class="node firewall" id="firewallNode">
                <span class="status-badge" id="fwBadge"></span>
                <span id="fwText">防火墙 已启用</span>
                <p style="margin-top:6px; font-size:0.65rem;">点击切换状态</p>
            </div>
            <div class="node" id="serverNode">
                <h3>牢J公益服务器</h3>
                <p>ljgy123.top</p>
            </div>
        </div>
    </div>

    <div class="control-bar">
        <button id="normalTrafficBtn">模拟正常访问</button>
        <button id="attackBtn">模拟攻击流量</button>
        <button id="clearEffectBtn">清除特效</button>
    </div>
    <div class="footer">
        灰色线表示网络链路 · 正常访问绿色脉冲 · 攻击时红色高亮 · 防火墙可拦截/放行
    </div>
</div>

<script>
    const canvas = document.getElementById('networkCanvas');
    const ctx = canvas.getContext('2d');
    let width = canvas.clientWidth;
    let height = 460;
    canvas.width = width;
    canvas.height = height;

    let firewallEnabled = true;
    let activeEffects = [];

    function getNodePositions() {
        const userRect = document.getElementById('user1').getBoundingClientRect();
        const fwRect = document.getElementById('firewallNode').getBoundingClientRect();
        const serverRect = document.getElementById('serverNode').getBoundingClientRect();
        const containerRect = document.querySelector('.topology').getBoundingClientRect();

        return {
            user: { x: userRect.left + userRect.width/2 - containerRect.left, y: userRect.top + userRect.height/2 - containerRect.top },
            fw: { x: fwRect.left + fwRect.width/2 - containerRect.left, y: fwRect.top + fwRect.height/2 - containerRect.top },
            server: { x: serverRect.left + serverRect.width/2 - containerRect.left, y: serverRect.top + serverRect.height/2 - containerRect.top }
        };
    }

    function drawLines(isAttack = false, isNormal = false, target = null) {
        const pos = getNodePositions();
        ctx.clearRect(0, 0, width, height);
        ctx.beginPath();
        ctx.moveTo(pos.user.x, pos.user.y);
        ctx.lineTo(pos.fw.x, pos.fw.y);
        ctx.lineTo(pos.server.x, pos.server.y);
        ctx.strokeStyle = '#cbd5e1';
        ctx.lineWidth = 2;
        ctx.stroke();

        if (isNormal || activeEffects.includes('normal')) {
            ctx.beginPath();
            ctx.moveTo(pos.user.x, pos.user.y);
            ctx.lineTo(pos.fw.x, pos.fw.y);
            ctx.lineTo(pos.server.x, pos.server.y);
            ctx.strokeStyle = '#2ecc71';
            ctx.lineWidth = 4;
            ctx.stroke();
            setTimeout(() => { if (!activeEffects.includes('normal')) drawLines(); else drawLines(false, true); }, 300);
        }

        if (isAttack || activeEffects.includes('attack')) {
            ctx.beginPath();
            ctx.moveTo(pos.user.x, pos.user.y);
            ctx.lineTo(pos.fw.x, pos.fw.y);
            ctx.lineTo(pos.server.x, pos.server.y);
            ctx.strokeStyle = '#e67e22';
            ctx.lineWidth = 5;
            ctx.stroke();
            setTimeout(() => { if (!activeEffects.includes('attack')) drawLines(); else drawLines(true, false); }, 280);
        }

        if (!isNormal && !isAttack && activeEffects.length === 0) {
            ctx.beginPath();
            ctx.moveTo(pos.user.x, pos.user.y);
            ctx.lineTo(pos.fw.x, pos.fw.y);
            ctx.lineTo(pos.server.x, pos.server.y);
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
    }

    function updateFirewallUI() {
        const fwDiv = document.getElementById('firewallNode');
        const badge = document.getElementById('fwBadge');
        const textSpan = document.getElementById('fwText');
        if (firewallEnabled) {
            fwDiv.classList.add('active');
            badge.style.background = '#2c5a2e';
            textSpan.innerText = '防火墙 已启用';
        } else {
            fwDiv.classList.remove('active');
            badge.style.background = '#cbd5e1';
            textSpan.innerText = '防火墙 已停用';
        }
        drawLines(false, false);
    }

    function triggerNormal() {
        if (!firewallEnabled) {
            alert('防火墙已停用，无法模拟正常访问（被拦截）');
            return;
        }
        activeEffects.push('normal');
        drawLines(false, true);
        setTimeout(() => {
            activeEffects = activeEffects.filter(e => e !== 'normal');
            drawLines(false, false);
        }, 600);
    }

    function triggerAttack() {
        if (firewallEnabled) {
            alert('防火墙已启用，攻击已被拦截');
            return;
        }
        activeEffects.push('attack');
        drawLines(true, false);
        setTimeout(() => {
            activeEffects = activeEffects.filter(e => e !== 'attack');
            drawLines(false, false);
        }, 800);
    }

    function clearEffects() {
        activeEffects = [];
        drawLines(false, false);
    }

    document.getElementById('firewallNode').addEventListener('click', () => {
        firewallEnabled = !firewallEnabled;
        updateFirewallUI();
    });
    document.getElementById('normalTrafficBtn').addEventListener('click', triggerNormal);
    document.getElementById('attackBtn').addEventListener('click', triggerAttack);
    document.getElementById('clearEffectBtn').addEventListener('click', clearEffects);

    window.addEventListener('resize', () => {
        width = canvas.clientWidth;
        canvas.width = width;
        drawLines(false, false);
    });
    updateFirewallUI();
    setInterval(() => { drawLines(false, false); }, 200);
</script>
</body>
</html>
