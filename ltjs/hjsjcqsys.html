    <style>
        * {

            padding: 0;

        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        /* 初始选择界面 */
        .setup-container {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 30px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .setup-container h2 {
            color: #fcd34d;
            margin-bottom: 20px;
        }

        .setup-item {
            margin: 16px 0;
            text-align: left;
        }

        .setup-item label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        .setup-item select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: #1e293b;
            color: white;
            border: 1px solid #475569;
            font-size: 16px;
        }

        .start-btn {
            margin-top: 20px;
            padding: 14px 30px;
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
        }

        /* 主界面容器 */
        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .container h1 {
            font-size: 24px;
            margin-bottom: 4px;
            color: #fcd34d;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .rocket-icon {
            font-size: 32px;
            margin: 4px 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            margin: 8px 0;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 12px;
            text-align: left;
            position: relative;
            overflow: hidden;
            min-height: 320px;
            height: auto;
        }

        .card h2 {
            width: 100%;
            font-size: 18px;
            margin: 0 0 8px 0;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info-left, .info-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 6px;
        }

        .info-right {
            border-left: 1px solid rgba(255,255,255,0.1);
            padding-left: 16px;
        }

        .info {
            font-size: 14px;
            margin: 0;
            min-height: 20px;
        }

        .label {
            color: #94a3b8;
            display: inline-block;
            width: 100px;
        }

        .btn {
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            border-radius: 50px;
            cursor: pointer;
            height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 12px;
        }

        /* 不同屏幕比例适配 */
        .ratio-21-9 { max-width: 1400px; aspect-ratio: 21 / 9; }
        .ratio-16-9 { max-width: 1200px; aspect-ratio: 16 / 9; }
        .ratio-16-10 { max-width: 1100px; aspect-ratio: 16 / 10; }
        .ratio-9-19-5 { max-width: 480px; aspect-ratio: 9 / 19.5; height: 95vh; }

        /* 单行 / 双行显示模式 */
        .mode-single .info { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mode-double .info { white-space: normal; line-height: 1.5; }
    </style>
</head>
<body>

<!-- 选择界面 -->
<div class="setup-container" id="setup">
    <h2>🚀 火箭抽取系统 - 适配设置</h2>

    <div class="setup-item">
        <label>选择屏幕比例</label>
        <select id="ratio">
            <option value="16-9">16:9 (标准)</option>
            <option value="21-9">21:9 (带鱼屏)</option>
            <option value="16-10">16:10 (笔记本)</option>
            <option value="9-19-5">9:19.5 (手机竖屏)</option>
        </select>
    </div>

    <div class="setup-item">
        <label>信息显示模式</label>
        <select id="mode">
            <option value="single">单行紧凑显示</option>
            <option value="double">双行宽松显示</option>
        </select>
    </div>

    <button class="start-btn" onclick="startSystem()">进入抽取系统</button>
</div>

<!-- 主界面 -->
<div class="container" id="main">

    </div>

</div>

    let isRolling = false;
    let rollInterval = null;

    // 启动系统，应用设置
    function startSystem() {
        const ratio = document.getElementById('ratio').value;
        const mode = document.getElementById('mode').value;
        
        document.getElementById('setup').style.display = 'none';
        document.getElementById('main').style.display = 'block';
        
        const main = document.getElementById('main');
        main.className = 'container ratio-' + ratio + ' mode-' + mode;
    }

    // 抽取逻辑
    function startRoll() {
        isRolling = true;
        document.getElementById('drawBtn').textContent = "🛑 点击停止抽取";
        
        rollInterval = setInterval(() => {
            showRandomRocket("🚀 抽取中...");
        }, 30);
    }

    function stopRoll() {
        isRolling = false;
        clearInterval(rollInterval);
        document.getElementById('drawBtn').textContent = "🎲 开始随机抽取";
        showRandomRocket("🚀 抽取成功！");
    }

    function showRandomRocket(title) {
        const idx = Math.floor(Math.random() * rockets.length);
        const [c,n,lev,desc,l1,l2,l3,boo] = rockets[idx];
        
        document.getElementById('result').innerHTML = `
            <h2>${title}</h2>
            <div class="info-left">
                <p class="info"><span class="label">国家：</span>${c}</p>
                <p class="info"><span class="label">型号：</span>${n}</p>
                <p class="info"><span class="label">级数：</span>${lev}</p>
                <p class="info"><span class="label">介绍：</span>${desc}</p>
            </div>
            <div class="info-right">
                <p class="info"><span class="label">一级：</span>${l1}</p>
                <p class="info"><span class="label">二级：</span>${l2}</p>
                <p class="info"><span class="label">三级：</span>${l3}</p>
                <p class="info"><span class="label">助推：</span>${boo}</p>
            </div>
        `;
    }

    function toggleRoll() {
        isRolling ? stopRoll() : startRoll();
    }
</script>
