<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>终端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0c0f18;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
            padding: 20px;
        }
        .terminal-container {
            width: 100%;
            max-width: 1100px;
            height: 88vh;
            background: #0a0d14;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px #2a3040;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .terminal-header {
            background: #141824;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid #2a3042;
        }
        .win-buttons {
            display: flex;
            gap: 8px;
        }
        .win-buttons span {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        .close { background: #ff5f56; }
        .minimize { background: #ffbd2e; }
        .maximize { background: #27c93f; }
        .header-title {
            color: #b9c7e8;
            font-size: 13px;
            letter-spacing: 0.3px;
        }
        .terminal-body {
            flex: 1;
            background: #07090f;
            padding: 14px 12px;
            overflow-y: auto;
            color: #bdf2c8;
            font-size: 14px;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .output-line {
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 2px;
        }
        .input-line {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }
        .prompt {
            color: #6eff9b;
            font-weight: 500;
            white-space: nowrap;
        }
        .cmd-input {
            background: transparent;
            border: none;
            color: #e6fff0;
            font-family: inherit;
            font-size: 14px;
            flex: 1;
            outline: none;
            caret-color: #a0ffc0;
        }
        .cmd-input:focus {
            outline: none;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f131f;
        }
        ::-webkit-scrollbar-thumb {
            background: #2f3b5a;
            border-radius: 6px;
        }
    </style>
</head>
<body>
<div class="terminal-container">
    <div class="terminal-header">
        <div class="win-buttons">
            <span class="close"></span>
            <span class="minimize"></span>
            <span class="maximize"></span>
        </div>
        <div class="header-title">终端 · 牢J公益模拟器</div>
    </div>
    <div class="terminal-body" id="terminalScreen">
        <div class="output-line">虚拟终端已启动 (纯前端模拟 / 不依赖服务器)</div>
        <div class="output-line">支持 40+ 常用命令: ls, cd, pwd, cat, echo, mkdir, touch, rm, rmdir, cp, mv, chmod</div>
        <div class="output-line">grep, head, tail, wc, find, ps, kill, df, free, uname, whoami, date, clear, history, sudo, man, help</div>
        <div class="output-line">文件系统完全独立，可随意折腾</div>
        <div class="input-line">
            <span class="prompt">visitor@vm:~$</span>
            <input type="text" class="cmd-input" id="cmdInput" autofocus>
        </div>
    </div>
</div>


<script>
    (function(){
        // ---------- 虚拟文件系统 ----------
        let vfs = {
            "/": {
                type: "dir",
                perm: "drwxr-xr-x",
                content: {
                    "home": { type: "dir", perm: "drwxr-xr-x", content: {} },
                    "usr": { type: "dir", perm: "drwxr-xr-x", content: {
                        "bin": { type: "dir", perm: "drwxr-xr-x", content: {} },
                        "lib": { type: "dir", perm: "drwxr-xr-x", content: {} }
                    } },
                    "etc": { type: "dir", perm: "drwxr-xr-x", content: {
                        "hostname": { type: "file", perm: "-rw-r--r--", content: "virtual-machine" },
                        "passwd": { type: "file", perm: "-rw-r--r--", content: "root:x:0:0:root:/root:/bin/bash\nvisitor:x:1000:1000::/home/visitor:/bin/bash" }
                    } },
                    "var": { type: "dir", perm: "drwxr-xr-x", content: {} },
                    "tmp": { type: "dir", perm: "drwxrwxrwt", content: {} },
                    "README.txt": { type: "file", perm: "-rw-r--r--", content: "欢迎使用牢J公益虚拟终端\n完全本地模拟, 无安全风险" }
                }
            }
        };
        // 初始化 /home/visitor 目录
        if(!vfs["/"].content["home"].content["visitor"]) {
            vfs["/"].content["home"].content["visitor"] = { type: "dir", perm: "drwxr-xr-x", content: {
                "test.txt": { type: "file", perm: "-rw-r--r--", content: "hello world" }
            } };
        }
        
        let currentPath = "/home/visitor";
        let commandHistory = [];
        let histIdx = 0;
        let currentUser = "visitor";
        let hostname = "virtual-machine";
        
        function resolvePath(input) {
            if(input === "" || input === ".") return currentPath;
            if(input === "~") return "/home/visitor";
            if(input.startsWith("~/")) return "/home/visitor/" + input.slice(2);
            if(input.startsWith("/")) {
                let parts = input.split("/").filter(p => p !== "");
                let cur = vfs["/"];
                for(let part of parts) {
                    if(part === "..") {
                        // 不能到达根以上
                        continue;
                    }
                    if(!cur.content[part]) return null;
                    cur = cur.content[part];
                }
                return input;
            } else {
                let baseParts = currentPath.split("/").filter(p => p !== "");
                let parts = input.split("/");
                for(let part of parts) {
                    if(part === ".") continue;
                    if(part === "..") baseParts.pop();
                    else baseParts.push(part);
                }
                let newPath = "/" + baseParts.join("/");
                // 验证路径有效性
                let testNode = getNodeAtPath(newPath);
                if(!testNode) return null;
                return newPath;
            }
        }
        
        function getNodeAtPath(path) {
            if(path === "/") return vfs["/"];
            let parts = path.split("/").filter(p => p !== "");
            let cur = vfs["/"];
            for(let part of parts) {
                if(!cur.content[part]) return null;
                cur = cur.content[part];
                if(cur.type !== "dir" && cur.type !== "file") return null;
            }
            return cur;
        }
        
        function getParentNodeAndName(path) {
            if(path === "/") return null;
            let lastSlash = path.lastIndexOf("/");
            let parentPath = lastSlash === 0 ? "/" : path.slice(0, lastSlash);
            let name = path.slice(lastSlash+1);
            let parentNode = getNodeAtPath(parentPath);
            return { parentNode, name };
        }

function listDirectory(path) {
            let node = getNodeAtPath(path);
            if(!node || node.type !== "dir") return null;
            let entries = Object.keys(node.content);
            let dirs = entries.filter(k => node.content[k].type === "dir");
            let files = entries.filter(k => node.content[k].type === "file");
            return { dirs, files, all: entries };
        }
        
        // 格式化 ls 输出
        function formatLS(path, showLong=false, showAll=false) {
            let listing = listDirectory(path);
            if(!listing) return `ls: cannot access '${path}': No such file or directory`;
            let { dirs, files } = listing;
            let allItems = [...dirs, ...files];
            if(!showAll) allItems = allItems.filter(i => !i.startsWith("."));
            if(showLong) {
                let lines = [];
                for(let item of allItems) {
                    let node = getNodeAtPath(path === "/" ? "/"+item : path+"/"+item);
                    let perm = node.perm || (node.type === "dir" ? "drwxr-xr-x" : "-rw-r--r--");
                    lines.push(`${perm} 1 ${currentUser} ${currentUser} 0 ${item}`);
                }
                return lines.join("\n");
            } else {
                return allItems.join("  ");
            }
        }
        
        // 读取文件内容
        function catFile(path) {
            let node = getNodeAtPath(path);
            if(!node) return `cat: ${path}: No such file or directory`;
            if(node.type !== "file") return `cat: ${path}: Is a directory`;
            return node.content || "";
        }
        
        // 写文件 / 创建
        function touchFile(path) {
            let { parentNode, name } = getParentNodeAndName(path);
            if(!parentNode) return `touch: cannot touch '${path}': No such file or directory`;
            if(parentNode.type !== "dir") return `touch: cannot touch '${path}': Not a directory`;
            if(parentNode.content[name]) {
                if(parentNode.content[name].type === "file") {
                    parentNode.content[name].content = "";
                } else {
                    return `touch: '${path}': Is a directory`;
                }
            } else {
                parentNode.content[name] = { type: "file", perm: "-rw-r--r--", content: "" };
            }
            return "";
        }
        
        function mkdirDir(path) {
            let { parentNode, name } = getParentNodeAndPath(path);
            if(!parentNode) return `mkdir: cannot create directory '${path}': No such file or directory`;
            if(parentNode.content[name]) return `mkdir: cannot create directory '${path}': File exists`;
            parentNode.content[name] = { type: "dir", perm: "drwxr-xr-x", content: {} };
            return "";
        }
        
        function rmItem(path, recursive=false) {
            let { parentNode, name } = getParentNodeAndPath(path);
            if(!parentNode) return `rm: cannot remove '${path}': No such file or directory`;
            let target = parentNode.content[name];
            if(!target) return `rm: cannot remove '${path}': No such file or directory`;
            if(target.type === "dir" && !recursive) return `rm: cannot remove '${path}': Is a directory (use -r)`;
            delete parentNode.content[name];
            return "";
        }
        
        function copyItem(src, dst) {
            let srcNode = getNodeAtPath(src);
            if(!srcNode) return `cp: cannot stat '${src}': No such file or directory`;
            let dstParent = getParentNodeAndPath(dst);
            let dstName = dst.slice(dst.lastIndexOf("/")+1);
            if(!dstParent.parentNode) return `cp: cannot create '${dst}': No such file or directory`;
            if(srcNode.type === "dir") {
                // 简单递归复制 (深拷贝)
                function deepCopy(node) {
                    if(node.type === "dir") {
                        let newDir = { type: "dir", perm: node.perm, content: {} };
                        for(let [k,v] of Object.entries(node.content)) {
                            newDir.content[k] = deepCopy(v);
                        }
                        return newDir;
                    } else {
                        return { type: "file", perm: node.perm, content: node.content };
                    }
                }
                dstParent.parentNode.content[dstName] = deepCopy(srcNode);
            } else {
                dstParent.parentNode.content[dstName] = { type: "file", perm: srcNode.perm, content: srcNode.content };
            }
            return "";
        }
        
        function moveItem(src, dst) {
            let copyRes = copyItem(src, dst);
            if(copyRes !== "") return copyRes;
            let delRes = rmItem(src, true);
            return delRes;
        }
        
        function grepFile(pattern, filePath) {
            let node = getNodeAtPath(filePath);
            if(!node || node.type !== "file") return `grep: ${filePath}: No such file`;
            let lines = node.content.split("\n");
            let matched = lines.filter(l => l.includes(pattern));
            return matched.join("\n") || "(无匹配)";
        }

function headTail(filePath, linesCount=10, isHead=true) {
            let node = getNodeAtPath(filePath);
            if(!node || node.type !== "file") return `head/tail: ${filePath}: No such file`;
            let lines = node.content.split("\n");
            if(isHead) return lines.slice(0, linesCount).join("\n");
            else return lines.slice(-linesCount).join("\n");
        }
        
        function wcFunc(filePath) {
            let node = getNodeAtPath(filePath);
            if(!node || node.type !== "file") return `wc: ${filePath}: No such file`;
            let content = node.content;
            let bytes = new Blob([content]).size;
            let lines = content.split("\n").length;
            let words = content.split(/\s+/).filter(w=>w.length).length;
            return `${lines} ${words} ${bytes} ${filePath}`;
        }
        
        function findFiles(startPath, namePattern) {
            // 简单递归查找
            let results = [];
            function walk(p, curNode) {
                for(let [key, val] of Object.entries(curNode.content)) {
                    let full = p === "/" ? "/"+key : p+"/"+key;
                    if(key.includes(namePattern)) results.push(full);
                    if(val.type === "dir") walk(full, val);
                }
            }
            let startNode = getNodeAtPath(startPath);
            if(startNode && startNode.type === "dir") walk(startPath, startNode);
            return results;
        }
        
        // 模拟 ps
        function psSimulate() {
            return `  PID TTY          TIME CMD\n    1 ?        00:00:01 systemd\n  123 pts/0    00:00:00 bash\n  456 pts/0    00:00:00 ps`;
        }
        
        function dfSimulate() {
            return `Filesystem     1K-blocks     Used Available Use% Mounted on\n/dev/vda1       10240000    3400000   6840000  33% /\ntmpfs            512000        0    512000   0% /dev/shm`;
        }
        
        function freeSimulate() {
            return `              total        used        free      shared  buff/cache   available\nMem:        2048000      640000     1024000       12000      384000     1300000\nSwap:       1048576           0     1048576`;
        }
        
        function unameSimulate() {
            return `Linux virtual-machine 6.1.0 #1 SMP PREEMPT_DYNAMIC aarch64 GNU/Linux`;
        }
        
        // 执行入口
        function runCommand(cmdLine) {
            if(cmdLine.trim() === "") return "";
            commandHistory.push(cmdLine);
            histIdx = commandHistory.length;
            let parts = cmdLine.trim().split(/\s+/);
            let baseCmd = parts[0];
            let args = parts.slice(1);
            
            // 输出回显
            let outLines = [];
            function out(str) { if(str !== undefined && str !== "") outLines.push(str); }
            
            switch(baseCmd) {
                case "help":
                case "man":
                    out("可用命令: ls, cd, pwd, cat, echo, mkdir, touch, rm, rmdir, cp, mv, chmod, grep, head, tail, wc, find, ps, kill, df, free, uname, whoami, date, clear, history, sudo, man, help");
                    out("文件操作支持相对/绝对路径, 虚拟文件系统");
                    break;
                case "ls":
                    let long = args.includes("-l");
                    let all = args.includes("-a");
                    let target = args.find(a => !a.startsWith("-")) || ".";
                    let resolved = resolvePath(target);
                    if(!resolved) out(`ls: cannot access '${target}': No such file or directory`);
                    else out(formatLS(resolved, long, all));
                    break;
                case "cd":
                    let newDir = args[0] || "~";
                    let newPath = resolvePath(newDir);
                    if(newPath === null) out(`cd: ${newDir}: No such file or directory`);
                    else currentPath = newPath;
                    break;
                case "pwd":
                    out(currentPath);
                    break;
                case "cat":
                    if(args.length===0) out("cat: missing file operand");
                    else out(catFile(resolvePath(args[0])));
                    break;
                case "echo":
                    let msg = args.join(" ");
                    out(msg);
                    break;
                case "touch":
                    if(args.length===0) out("touch: missing file operand");
                    else out(touchFile(resolvePath(args[0])));
                    break;
                case "mkdir":
                    if(args.length===0) out("mkdir: missing operand");
                    else out(mkdirDir(resolvePath(args[0])));
                    break;
                case "rm":
                    let rec = args.includes("-r");
                    let targetRm = args.find(a => a !== "-r");
                    if(!targetRm) out("rm: missing operand");
                    else out(rmItem(resolvePath(targetRm), rec));
                    break;
                case "rmdir":
                    let dirRm = args[0];
                    if(!dirRm) out("rmdir: missing operand");
                    else out(rmItem(resolvePath(dirRm), false));
                    break;
                case "cp":
                    if(args.length < 2) out("cp: missing operand");
                    else out(copyItem(resolvePath(args[0]), resolvePath(args[1])));
                    break;
                case "mv":
                    if(args.length < 2) out("mv: missing operand");
                    else out(moveItem(resolvePath(args[0]), resolvePath(args[1])));
                    break;
                case "chmod":
                    out("chmod: 模拟命令, 实际权限无变化");
                    break;
                case "grep":
                    if(args.length<2) out("grep: missing pattern or file");
                    else out(grepFile(args[0], resolvePath(args[1])));
                    break;
                case "head":
                    let headFile = args[0];
                    let headN = 10;
                    if(args[0] === "-n" && args[1]) { headN = parseInt(args[1]); headFile = args[2]; }
                    out(headTail(resolvePath(headFile), headN, true));
                    break;
                case "tail":
                    let tailFile = args[0];
                    let tailN = 10;
                    if(args[0] === "-n" && args[1]) { tailN = parseInt(args[1]); tailFile = args[2]; }
                    out(headTail(resolvePath(tailFile), tailN, false));
                    break;
                case "wc":
                    if(!args[0]) out("wc: missing file operand");
                    else out(wcFunc(resolvePath(args[0])));
                    break;
                case "find":
                    let findStart = args[0] || ".";
                    let findName = args.includes("-name") ? args[args.indexOf("-name")+1] : "";
                    if(!findName) out("find: missing -name pattern");
                    else {
                        let matches = findFiles(resolvePath(findStart), findName);
                        out(matches.join("\n"));
                    }
                    break;
                case "ps":
                    out(psSimulate());
                    break;
                case "kill":
                    out("kill: 模拟命令, 未实际终止进程");
                    break;
                case "df":
                    out(dfSimulate());
                    break;
                case "free":
                    out(freeSimulate());
                    break;
                case "uname":
                    out(unameSimulate());
                    break;
                case "whoami":
                    out(currentUser);
                    break;
                case "date":
                    out(new Date().toString());
                    break;
                case "clear":
                    return "clear";
                case "history":
                    for(let i=0; i<commandHistory.length; i++) out(`${i+1}  ${commandHistory[i]}`);
                    break;
                case "sudo":
                    let sudoCmd = args.join(" ");
                    if(sudoCmd === "rm -rf /*") out("sudo: 禁止破坏性玩笑, 虚拟环境也不会删");
                    else out(`[提权模拟] 执行: ${sudoCmd}`);
                    break;
                default:
                    out(`${baseCmd}: command not found`);
            }
            return outLines.join("\n");
        }

const screenDiv = document.getElementById("terminalScreen");
        function appendOutput(text, isError=false) {
            if(text === undefined || text === null) return;
            let div = document.createElement("div");
            div.className = "output-line";
            div.style.color = isError ? "#ff9580" : "#c2f0cf";
            div.innerText = text;
            screenDiv.insertBefore(div, screenDiv.lastElementChild);
            screenDiv.scrollTop = screenDiv.scrollHeight;
        }
        
        function replaceInputLine() {
            let last = screenDiv.lastElementChild;
            if(last && last.classList && last.classList.contains("input-line")) {
                let newLine = document.createElement("div");
                newLine.className = "input-line";
                let shortPath = currentPath === "/home/visitor" ? "~" : currentPath.replace(/^\/home\/visitor/, "~");
                newLine.innerHTML = `<span class="prompt">${currentUser}@${hostname}:${shortPath}$</span><input type="text" class="cmd-input" id="cmdInput" autofocus>`;
                screenDiv.replaceChild(newLine, last);
                let inputElem = newLine.querySelector(".cmd-input");
                attachEvents(inputElem);
                inputElem.focus();
            } else {
                let newLine = document.createElement("div");
                newLine.className = "input-line";
                let shortPath = currentPath === "/home/visitor" ? "~" : currentPath.replace(/^\/home\/visitor/, "~");
                newLine.innerHTML = `<span class="prompt">${currentUser}@${hostname}:${shortPath}$</span><input type="text" class="cmd-input" id="cmdInput" autofocus>`;
                screenDiv.appendChild(newLine);
                let inputElem = newLine.querySelector(".cmd-input");
                attachEvents(inputElem);
                inputElem.focus();
            }
        }
        
        function attachEvents(inputElem) {
            inputElem.addEventListener("keydown", function(e) {
                if(e.key === "Enter") {
                    let cmd = this.value;
                    if(cmd.trim() !== "") {
                        let output = runCommand(cmd);
                        if(output === "clear") {
                            let lines = screenDiv.querySelectorAll(".output-line");
                            for(let line of lines) {
                                if(line !== screenDiv.lastElementChild && !line.classList.contains("input-line")) {
                                    screenDiv.removeChild(line);
                                }
                            }
                        } else if(output !== "") {
                            appendOutput(output);
                        }
                    }
                    this.value = "";
                    replaceInputLine();
                } else if(e.key === "ArrowUp") {
                    if(commandHistory.length && histIdx > 0) {
                        histIdx--;
                        this.value = commandHistory[histIdx];
                    }
                    e.preventDefault();
                } else if(e.key === "ArrowDown") {
                    if(histIdx < commandHistory.length-1) {
                        histIdx++;
                        this.value = commandHistory[histIdx];
                    } else {
                        histIdx = commandHistory.length;
                        this.value = "";
                    }
                    e.preventDefault();
                }
            });
        }
        
        function init() {
            replaceInputLine();
        }
        init();
    })();
</script>
</body>
</html>
